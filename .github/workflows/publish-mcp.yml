name: Publish to PyPI

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Check if version is already on PyPI
        id: check_version
        shell: bash
        run: |
          # 1. Get the current version from pyproject.toml
          CURRENT_VERSION=$(grep -m 1 '^version = ' pyproject.toml | tr -d '"' | tr -d "'" | awk '{print $3}')
          PACKAGE_NAME=$(grep -m 1 '^name = ' pyproject.toml | tr -d '"' | tr -d "'" | awk '{print $3}')
          
          echo "Current local version: $CURRENT_VERSION"
          
          # 2. Query PyPI for the version (returns 404 if version doesn't exist)
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/$PACKAGE_NAME/$CURRENT_VERSION/json || echo "404")
          
          if [ "$STATUS_CODE" -eq "200" ]; then
            echo "Version $CURRENT_VERSION already exists on PyPI. Skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Version $CURRENT_VERSION is new. Proceeding..."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check_version.outputs.skip != 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.check_version.outputs.skip != 'true'
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
